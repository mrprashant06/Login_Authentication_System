<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login Authentication System</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="Authentication workspace">
        <header class="topbar">
          <div class="brand">
            <img src="/assets/auth-mark.svg" alt="" class="brand-mark">
            <div>
              <p class="eyebrow">ASP.NET Core JWT</p>
              <h1>Login Authentication System</h1>
            </div>
          </div>
          <div class="server-state" id="serverState">Ready</div>
        </header>

        <div class="layout-grid">
          <section class="auth-panel" aria-labelledby="authTitle">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Account Access</p>
                <h2 id="authTitle">Register or sign in</h2>
              </div>
              <div class="mode-tabs" role="tablist" aria-label="Authentication mode">
                <button class="mode-tab is-active" type="button" id="registerTab">Register</button>
                <button class="mode-tab" type="button" id="loginTab">Login</button>
              </div>
            </div>

            <form class="auth-form" id="registerForm">
              <label>
                Full name
                <input id="registerFullName" name="fullName" autocomplete="name" required maxlength="100" placeholder="Demo User">
              </label>
              <label>
                Email
                <input id="registerEmail" name="email" type="email" autocomplete="email" required maxlength="256" placeholder="demo@example.com">
              </label>
              <label>
                Password
                <input id="registerPassword" name="password" type="password" autocomplete="new-password" required minlength="6" maxlength="100" placeholder="Password123!">
              </label>
              <button class="primary-action" type="submit">Create account</button>
            </form>

            <form class="auth-form is-hidden" id="loginForm">
              <label>
                Email
                <input id="loginEmail" name="email" type="email" autocomplete="email" required maxlength="256" placeholder="demo@example.com">
              </label>
              <label>
                Password
                <input id="loginPassword" name="password" type="password" autocomplete="current-password" required maxlength="100" placeholder="Password123!">
              </label>
              <button class="primary-action" type="submit">Sign in</button>
            </form>

            <p class="message" id="message" role="status" aria-live="polite"></p>
          </section>

          <section class="profile-panel" aria-labelledby="profileTitle">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Session</p>
                <h2 id="profileTitle">Current user</h2>
              </div>
              <button class="secondary-action" type="button" id="signOutButton">Sign out</button>
            </div>

            <dl class="profile-list">
              <div>
                <dt>Name</dt>
                <dd id="profileName">Not signed in</dd>
              </div>
              <div>
                <dt>Email</dt>
                <dd id="profileEmail">-</dd>
              </div>
              <div>
                <dt>Role</dt>
                <dd id="profileRole">-</dd>
              </div>
              <div>
                <dt>Token</dt>
                <dd id="tokenPreview">-</dd>
              </div>
            </dl>

            <button class="secondary-action full-width" type="button" id="loadProfileButton">Refresh profile</button>
          </section>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
